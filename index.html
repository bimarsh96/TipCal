<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TipAndBill</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- Tip Calculator -->
<table>
  <thead>
    <tr>
      <th>Tip %</th>
      <th>Tip Amount</th>
      <th>Total</th>
    </tr>
  </thead>

  <tbody id="tipbody"></tbody>
</table>

<div class="calculator-container">
  <div class="price-row">
    <label>Price:</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="text" class="has-prefix" id="price1" value="" />
    </div>
  </div>
  <div class="button-row">
    <button class="btn-calculate">
      Calculate <i class="fa-regular fa-circle-play"></i>
    </button>
    <button class="btn-clear1">Clear</button>
  </div>
</div>

<br><br>

<!-- Shared Bill -->

<div class="result-section" style="display:none;">
  <h3>Result</h3>
  <p>Tip: <span id="result-tip"></span></p>
  <p>Total Amount: <span id="result-total"></span></p>
  <p>Tip Shared: <span id="result-shared"></span></p>
</div>

<div class="form-wrap">
  <div class="form-row">
    <label>Price</label>
    <div class="input-wrap">
      <span class="prefix">$</span>
      <input type="text" class="has-prefix" id="price" value="" />
    </div>
  </div>

  <div class="form-row">
    <label>Tip %</label>
    <div class="input-wrap">
      <input type="text" class="has-suffix" id="tip" value="15" />
      <span class="suffix">%</span>
    </div>
  </div>

  <div class="form-row">
    <label>Number of People</label>
    <div class="input-wrap">
      <input type="text" id="people" value="1" />
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-calc">
      Calculate <i class="fa-regular fa-circle-play"></i>
    </button>
    <button class="btn-clear2">Clear</button>
  </div>
</div>

<script src="cal.js"></script>
</body>
</html>
